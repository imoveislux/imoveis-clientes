<!DOCTYPE html>
<html>
<head>
  <title>Imóveis</title>
  <meta charset="UTF-8">
</head>
<body>

<h1>Imóveis do Corretor</h1>

<div id="imoveis"></div>

<script>
async function carregar() {

  const params = new URLSearchParams(window.location.search);
  const corretorId = params.get("id");

  if (!corretorId) {
    document.getElementById("imoveis").innerHTML =
      "<p>Acesse pelo link do corretor</p>";
    return;
  }

  const res = await fetch("dados.json");
  const dados = await res.json();

  // procurar corretor pelo corretor_id
  const corretor = dados.corretores.find(c => c.corretor_id === corretorId);

  if (!corretor || !corretor.ativo) {
    document.getElementById("imoveis").innerHTML =
      "<p>Corretor indisponível</p>";
    return;
  }

  // filtrar imóveis pelo corretor_id
  const lista = dados.imoveis.filter(i => i.corretor_id === corretorId);

  const container = document.getElementById("imoveis");
  container.innerHTML = "";

  if (lista.length === 0) {
    container.innerHTML = "<p>Nenhum imóvel encontrado</p>";
    return;
  }

  lista.forEach(imovel => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${imovel.titulo}</h3>
      <img src="${imovel.imagem}" width="200"><br>
      <p>R$ ${imovel.preco}</p>
      <a href="https://SEU-BASE44/?id=${corretorId}&imovel=${imovel.id}">
        Ver detalhes
      </a>
      <hr>
    `;

    container.appendChild(div);
  });
}

carregar();
</script>

</body>
</html>
