[<script type="module">
import { createClient } from "https://esm.sh/@base44/sdk";

const APP_ID = "69a913ab8114f44cd09a2daa";

// pega o ?id=c001 da URL
const params = new URLSearchParams(window.location.search);
const corretorId = params.get("id");

// função principal
async function carregarImoveis() {
  try {
    const imoveis = await base44.entities.Imovel.list();

    // filtra pelo corretor
    const filtrados = corretorId
      ? imoveis.filter(i => i.corretor_id === corretorId)
      : imoveis;

    renderizar(filtrados);
  } catch (erro) {
    console.error("Erro ao carregar imóveis:", erro);
  }
}

// renderizar na tela
function renderizar(lista) {
  const container = document.getElementById("imoveis");
  container.innerHTML = "";

  if (lista.length === 0) {
    container.innerHTML = "<p>Nenhum imóvel encontrado</p>";
    return;
  }

  lista.forEach(imovel => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${imovel.titulo || "Imóvel"}</h3>
      <p>Preço: ${imovel.preco || "-"}</p>
      <img src="${imovel.imagens?.[0] || ""}" width="200" />
    `;

    container.appendChild(div);
  });
}

carregarImoveis();
